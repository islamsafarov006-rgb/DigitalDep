<div class="container">
  <fieldset>
    <legend>Доступные документы</legend>

    <div class="doc-item">
      <div class="doc-info">
        <span class="doc-icon">📄</span>
        <div class="doc-text">
          <span class="doc-title">Силлабус по дисциплине "Социология"</span>
          <span class="doc-subtitle">ID: #0001 | 2026</span>
        </div>
      </div>

      <button
        (click)="openSyllabus(1)"
        [disabled]="isLoading()"
        class="view-btn-modern">
        @if (isLoading()) {
          <span class="loader"></span>
        } @else {
          Просмотреть
        }
      </button>
    </div>
  </fieldset>

  @if (isModalOpen() && selectedSyllabus()) {
    <app-syllabus-modal
      [syllabusData]="selectedSyllabus()!"
      (close)="closeModal()">
    </app-syllabus-modal>
  }
</div>
