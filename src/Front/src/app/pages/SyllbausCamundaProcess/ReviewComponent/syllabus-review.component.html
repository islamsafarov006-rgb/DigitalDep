<div class="management-container">
  <!-- Показываем заглушку, пока данные силлабуса не загружены -->
  <div *ngIf="!syllabus" class="loading-state" style="padding: 20px; text-align: center;">
    <p>Загрузка данных силлабуса...</p>
  </div>

  <div class="syllabus-page" *ngIf="syllabus">
    <div class="content-side">
      <div class="management-card">
        <div class="header-area">
          <h2>Просмотр силлабуса</h2>
        </div>
        <div class="form-group">
          <label>Цели курса</label>
          <!-- Используем безопасный оператор ?. на всякий случай -->
          <div class="preview-box">{{ syllabus?.goals || 'Цели не указаны' }}</div>
        </div>
      </div>
    </div>

    <div class="action-side">
      <div class="management-card">
        <h3>Решение</h3>
        <div class="form-group">
          <label>Ваш комментарий</label>
          <textarea class="form-control" [(ngModel)]="comment" rows="5"></textarea>
        </div>
        <div class="actions">
          <button class="btn-secondary" (click)="submit(false)">Отклонить</button>
          <button class="btn-primary" (click)="submit(true)">Одобрить</button>
        </div>
      </div>
    </div>
  </div>
</div>
