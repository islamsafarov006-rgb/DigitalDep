<div class="review-panel" *ngIf="task(); else noTask">

  <div class="review-header">
    <div class="icon-wrapper">
      <span class="material-symbols-outlined header-icon">local_library</span>
    </div>
    <div class="header-text">
      <h2 class="review-title">Проверка списка литературы</h2>
      <p class="review-subtitle" *ngIf="document()">
        {{ document()!.discipline.name }} · {{ document()!.academicYear }} уч. год
      </p>
    </div>
  </div>

  <div class="review-body" *ngIf="!isLoading(); else loadingTpl">

    <div *ngIf="literature().length > 0; else emptyLit" class="lit-list">
      <div class="lit-item" *ngFor="let book of literature(); let i = index">
        <span class="lit-index">{{ i + 1 }}</span>
        <div class="lit-info">
          <span class="lit-title">{{ book.title }}</span>
          <span class="lit-author">{{ book.author }}</span>
          <span class="lit-isbn" *ngIf="book.isbn">ISBN: {{ book.isbn }}</span>
        </div>
      </div>
    </div>

    <ng-template #emptyLit>
      <div class="empty-state">
        <span class="empty-icon">📚</span>
        <p>Список литературы не заполнен</p>
      </div>
    </ng-template>

    <div class="comment-section">
      <label class="comment-label" for="lib-comment">Замечания и комментарии библиотекаря:</label>
      <textarea
        id="lib-comment"
        class="comment-input"
        [(ngModel)]="comment"
        [disabled]="isSubmitting()"
        placeholder="Укажите замечания по книгам или введите комментарий..."
        rows="4"
      ></textarea>
    </div>

    <div class="review-actions">
      <button
        class="btn btn--reject"
        (click)="submit(false)"
        [disabled]="isSubmitting()"
      >
        Отклонить
      </button>
      <button
        class="btn btn--approve"
        (click)="submit(true)"
        [disabled]="isSubmitting()"
      >
        {{ isSubmitting() ? 'Отправка…' : 'Согласовать' }}
      </button>
    </div>

  </div>

  <ng-template #loadingTpl>
    <div class="loader-wrap">
      <div class="spinner"></div>
      <p>Загрузка литературы…</p>
    </div>
  </ng-template>

</div>

<ng-template #noTask>
  <div class="loader-wrap">
    <div class="spinner"></div>
    <p>Загрузка задачи…</p>
  </div>
</ng-template>
