@if (syllabusData) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <header class="modal-header">
        <div class="title-info">
          <h3>{{ syllabusData.discipline?.name || 'Загрузка...' }}</h3>
          <span class="badge" [ngClass]="syllabusData.status || 'draft'">
            {{ syllabusData.status || 'DRAFT' }}
          </span>
        </div>

        <div class="header-actions">
          @if (!isEditMode) {
            <button class="btn-edit" (click)="toggleEdit()">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
              Редактировать
            </button>
          } @else {
            <button class="btn-cancel" (click)="toggleEdit()">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 18L18 6M6 6l12 12"></path>
              </svg>
              Отмена
            </button>
            <button class="btn-save" (click)="saveChanges()">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              Сохранить
            </button>
          }
          <button class="btn-close" (click)="closeModal()" aria-label="Закрыть">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </header>

      <main class="modal-body">
        <div class="meta-grid">
          <div class="meta-item">
            <label>Учебный год:</label> <span>{{ syllabusData.academicYear }}</span>
          </div>
          <div class="meta-item">
            <label>Семестр:</label> <span>{{ syllabusData.semester }}</span>
          </div>
        </div>

        <section class="table-section">
          <tables
            [config]="tableConfig"
            [data]="tableDataSource"
            (changeData)="onDataChange($event)">
          </tables>
        </section>
      </main>
    </div>
  </div>
} @else {
  <div class="modal-loading">
    <div class="spinner"></div>
    <p>Загрузка данных...</p>
  </div>
}
