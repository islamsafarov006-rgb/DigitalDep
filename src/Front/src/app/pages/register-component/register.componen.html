<div class="auth-container">
  <div class="auth-card">
    <div class="logo-area">
      <img src="assets/images/logo_small.png" alt="IITU" *ngIf="false">
      <h2>Регистрация</h2>
      <p class="subtitle">Создайте аккаунт в системе «Цифровая кафедра»</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>ФИО полностью</label>
        <input type="text" formControlName="fullName" placeholder="Иванов Иван Иванович">
      </div>

      <div class="row">
        <div class="form-group">
          <label>ИИН</label>
          <input type="text" formControlName="iin" placeholder="123456789012" maxlength="12">
        </div>
        <div class="form-group">
          <label>Должность</label>
          <input type="text" formControlName="position" placeholder="PhD, ассоциированный профессор">
        </div>
      </div>

      <div class="form-group">
        <label>Email (корпоративный)</label>
        <input type="email" formControlName="email" placeholder="example@iitu.edu.kz">
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid">
        Зарегистрироваться
      </button>

      <p class="footer-link">
        Уже есть аккаунт? <a href="/login">Войти</a>
      </p>
    </form>
  </div>
</div>
