<header class="header" *ngIf="isVisible">  <div class="header-left">
    <div class="logo-badge">DD</div>
    <h2>Digital Department</h2>
  </div>

  <div class="header-right">
    <mat-form-field appearance="outline" class="lang-select">
      <mat-select [value]="getActiveLang()" (selectionChange)="changeLanguage($event.value)">
        <mat-select-trigger>
          <span class="flag-trigger">{{ getActiveLangFlag() }}</span>
          <span class="lang-code">{{ getActiveLang() }}</span>
        </mat-select-trigger>

        <mat-option *ngFor="let lang of languages" [value]="lang.code">
          <div class="option-content">
            <span class="flag">{{ lang.flag }}</span>
            <span class="lang-label">{{ lang.name }}</span>
          </div>
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="divider"></div>

    <div class="user-profile" *ngIf="user">
      <div class="user-info">
        <span class="user-name">{{ user.fio }}</span>
        <span class="user-position">{{ user.position }}</span>
      </div>
      <div class="avatar">
        {{ user.fio ? user.fio.charAt(0) : 'U' }}
      </div>
    </div>

    <button class="logout-btn" (click)="logout()" title="Выйти">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Выйти</span>
    </button>
  </div>
</header>
