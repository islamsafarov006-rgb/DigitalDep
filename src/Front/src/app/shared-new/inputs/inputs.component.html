<ng-container *ngIf="type === 'date-view'">
  <input [disabled]="disabled" type="text"
         [ngModel]="value | date:'dd.MM.yyyy'"
         (ngModelChange)="modelChanges($event)"
         [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }"
         [placeholder]="placeholder"/>
</ng-container>

<ng-container *ngIf="type === 'number'">
  <input
    [disabled]="disabled"
    type="number"
    *ngIf="!innerControl"
    [(ngModel)]="value"
    [required]="required"
    [min]="min ?? 0"
    (input)="clampNumber($event)"
    (keydown)="preventNegative($event)"
    (ngModelChange)="modelChanges($event)"
    [placeholder]="placeholderText || ''"
    [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }"
  />

  <input
    [disabled]="disabled"
    type="number"
    *ngIf="innerControl"
    [formControl]="innerControl"
    [required]="required"
    [min]="min ?? 0"
    (input)="clampNumber($event)"
    (keydown)="preventNegative($event)"
    (change)="modelChanges($event)"
    [placeholder]="placeholderText || ''"
    [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }"
  />
</ng-container>

<ng-container *ngIf="type === 'form-filed-number'">
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="custom-inputs" *ngIf="!innerControl">
    <mat-label *ngIf="label">{{ label | transloco}}</mat-label>
    <input matInput
           [disabled]="disabled"
           type="number"
           [(ngModel)]="value"
           [required]="required"
           [min]="min ?? 0"
           (input)="clampNumber($event)"

           (ngModelChange)="modelChanges($event)"
           [placeholder]="placeholderText || ''"
           [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }"
    />
  </mat-form-field>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="custom-inputs" *ngIf="innerControl">
    <mat-label *ngIf="label">{{ label | transloco}}</mat-label>
    <input matInput
           [disabled]="disabled"

           [required]="required"

           (change)="modelChanges($event)"
           [placeholder]="placeholderText || ''"
           [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }"
    />
  </mat-form-field>
</ng-container>

<ng-container *ngIf="type === 'date'">
  <div class="custom-datepicker" *ngIf="!innerControl"
       [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }">
    <input
      matInput
      onlyDateCharacters
      [matDatepicker]="picker"
      [(ngModel)]="value"
      (ngModelChange)="onDateChange($event)"
      class="date-input"
      fxFlex="80"
      [placeholder]="placeholder"
      [min]="dateMin"
      [max]="dateMax"
      [disabled]="disabled"
      [required]="required"
    />
    <mat-datepicker-toggle [for]="picker" fxFlex="20" [disabled]="disabled"></mat-datepicker-toggle>
    <mat-datepicker #picker [disabled]="disabled"></mat-datepicker>
  </div>

  <div class="custom-datepicker" *ngIf="innerControl"
       [ngClass]="{ 'invalid': fieldName && fieldErrors[fieldName] }">
    <input
      matInput
      onlyDateCharacters
      [matDatepicker]="picker"
      [formControl]="innerControl"
      (dateChange)="onDateChangeinnerControl($event)"
      class="date-input"
      fxFlex="80"
      [placeholder]="placeholder"
      [min]="dateMin"
      [max]="dateMax"
      [disabled]="disabled"
      [required]="required"
    />
    <mat-datepicker-toggle [for]="picker" fxFlex="20" [disabled]="disabled"></mat-datepicker-toggle>
    <mat-datepicker #picker [disabled]="disabled"></mat-datepicker>
  </div>
</ng-container>

<ng-container *ngIf="type === 'textarea'">

      [disabled]="disabled">
    </textarea>
</ng-container>
