    name: digital-department-ais

  datasource:
    url: jdbc:postgresql://ep-raspy-hill-aqiset9c-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_KI1zLOB8rSNF
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
