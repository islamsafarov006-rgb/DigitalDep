    port: 465
    username: digitaldep.iitu@mail.ru
    password: ygHqXqnqIG2ASq3UejrT
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          ssl:
            enable: true
          # 🌟 ВОТ ЭТА СТРОКА РЕШАЕТ ПРОБЛЕМУ ЗАВИСАНИЯ НА MAIL FROM:
